<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<title>Game</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

/* canvas */

#canvas{
width:100vw;
height:100vh;
display:block;
}

/* blurred background */

#loading-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("background.png") center/cover no-repeat;
filter:blur(25px);
transform:scale(1.1);
z-index:-1;
}

/* loader */

#loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:420px;
}

#progress{
height:10px;
background:#222;
border:1px solid #444;
}

#bar{
height:100%;
width:0%;
background:#fff;
transition:width .2s;
}

#text{
color:white;
text-align:center;
margin-top:10px;
font-size:14px;
}

#notice{
color:#ccc;
font-size:12px;
text-align:center;
margin-top:8px;
opacity:0.8;
}

</style>

</head>

<body>

<div id="loading-bg"></div>

<canvas id="canvas"></canvas>

<div id="loader">

<div id="progress">
<div id="bar"></div>
</div>

<div id="text">Loading...</div>

<div id="notice">
Esse jogo demora para carregar porcausa do tamanho dele, por favor espere
</div>

</div>

<script src="coi-serviceworker.min.js"></script>
<script src="index.js"></script>

<script>

const bar=document.getElementById("bar")
const text=document.getElementById("text")
const loader=document.getElementById("loader")

function setProgress(p){

bar.style.width=p+"%"
text.innerText="Loading "+Math.floor(p)+"%"

}

/* baixar partes */

async function loadParts(base,count,start,end){

let buffers=[]
let loaded=0

for(let i=0;i<count;i++){

const r=await fetch(base+".part"+i)
const b=await r.arrayBuffer()

buffers.push(b)

loaded++
let percent=start+(loaded/count)*(end-start)

setProgress(percent)

}

let total=0
buffers.forEach(b=>total+=b.byteLength)

let tmp=new Uint8Array(total)

let offset=0

buffers.forEach(b=>{
tmp.set(new Uint8Array(b),offset)
offset+=b.byteLength
})

return tmp.buffer

}

(async()=>{

try{

/* carregar wasm */

const wasmBuffer=await loadParts("index.wasm",2,0,20)

/* criar blob */

const wasmBlob=new Blob([wasmBuffer],{type:"application/wasm"})
const wasmURL=URL.createObjectURL(wasmBlob)

/* interceptar fetch do wasm */

const originalFetch=window.fetch

window.fetch=function(resource,options){

if(typeof resource==="string" && resource.endsWith("index.wasm")){
return originalFetch(wasmURL)
}

return originalFetch(resource,options)

}

/* carregar pck */

const pckBuffer=await loadParts("index.pck",20,20,90)

const pckURL=URL.createObjectURL(new Blob([pckBuffer]))

setProgress(95)

/* iniciar engine */

const engine=new Engine({
executable:"index",
canvasResizePolicy:2
})

await engine.startGame({

canvas:document.getElementById("canvas"),
mainPack:pckURL,

onProgress:(c,t)=>{

if(t>0){
setProgress(95+(c/t)*5)
}

}

})

loader.style.display="none"

}catch(e){

text.innerText="Error loading game"
console.error(e)

}

})()

</script>

</body>
</html>
