<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flash Game</title>

<script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle"></script>

<style>
html, body {
    margin:0;
    height:100%;
    background:black;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#game{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#player{
    aspect-ratio: 4 / 3; /* proporção do jogo */
    height:100%;
    max-width:100%;
}
</style>
</head>

<body>

<div id="game">
    <div id="player"></div>
</div>

<script>
window.RufflePlayer = window.RufflePlayer || {};

window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("player").appendChild(player);
    player.load("game.swf");
});
</script>

</body>
</html>
