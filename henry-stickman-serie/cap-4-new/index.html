<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flash Game</title>

<script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle"></script>

<style>
html, body {
    margin:0;
    height:100%;
    background:black;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#game{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#player{
    aspect-ratio: 4 / 3; /* proporção do jogo */
    height:100%;
    max-width:100%;
}
</style>
</head>

<body>

<div id="game">
    <div id="player"></div>
</div>

<script>
window.RufflePlayer = window.RufflePlayer || {};

async function loadGame() {

    const parts = [
        "part1.bin",
        "part2.bin",
        "part3.bin",
        "part4.bin"
    ];

    let buffers = [];

    for (let part of parts) {
        let res = await fetch(part);
        let buf = await res.arrayBuffer();
        buffers.push(buf);
    }

    let totalLength = buffers.reduce((sum, b) => sum + b.byteLength, 0);
    let combined = new Uint8Array(totalLength);

    let offset = 0;
    for (let buf of buffers) {
        combined.set(new Uint8Array(buf), offset);
        offset += buf.byteLength;
    }

    let blob = new Blob([combined], {type: "application/x-shockwave-flash"});
    let url = URL.createObjectURL(blob);

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("player").appendChild(player);

    player.load(url);
}

window.addEventListener("load", loadGame);
</script>

</body>
</html>
