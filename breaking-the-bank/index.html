<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flash Game</title>

<script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
}

#game {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div id="game"></div>

<script>
window.RufflePlayer = window.RufflePlayer || {};
window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    document.getElementById("game").appendChild(player);

    player.load("game.swf");
});
</script>

</body>
</html>
